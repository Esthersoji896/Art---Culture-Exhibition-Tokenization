name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main]

jobs:
  tests:
    name: "Art & Culture Exhibition Tokenization - Smart Contract CI"
    runs-on: ubuntu-latest
    
    steps:
      - name: "Checkout code"
        uses: actions/checkout@v3
        
      - name: "Check contract syntax"
        uses: docker://hirosystems/clarinet:latest
        with:
          args: check
          
      - name: "Setup Node.js"
        uses: actions/setup-node@v3
        with:
          node-version: 18
          cache: 'npm'
          
      - name: "Install dependencies"
        run: npm ci
        
      - name: "Run tests"
        run: npm test